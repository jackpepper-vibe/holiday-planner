<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="cl"><rect width="512" height="512" rx="112"/></clipPath>
    <linearGradient id="vig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- French tricolor background -->
  <g clip-path="url(#cl)">
    <rect width="512" height="512" fill="#002395"/>
    <rect x="171" y="0" width="170" height="512" fill="#EFEFEF"/>
    <rect x="341" y="0" width="171" height="512" fill="#ED2939"/>
    <rect width="512" height="512" fill="rgba(4,10,42,0.38)"/>
    <rect width="512" height="512" fill="url(#vig)"/>
  </g>

  <!-- Funnel cap -->
  <rect x="155" y="92" width="70" height="20" rx="6" fill="white" opacity="0.96"/>
  <!-- Funnel stack -->
  <rect x="168" y="112" width="44" height="80" rx="10" fill="white" opacity="0.96"/>
  <!-- Green funnel band -->
  <rect x="168" y="150" width="44" height="18" rx="4" fill="#16a34a"/>

  <!-- Superstructure — one solid block -->
  <rect x="50" y="194" width="400" height="118" rx="10" fill="white" opacity="0.96"/>

  <!-- Hull (white, bow pointing right) -->
  <path d="M 48,310 L 48,434 L 446,434 L 482,372 L 446,310 Z" fill="white" opacity="0.96"/>

  <!-- Green hull stripe -->
  <path d="M 48,310 L 48,356 L 469,356 L 446,310 Z" fill="#16a34a"/>

  <!-- Waterline shimmer -->
  <rect x="48" y="430" width="434" height="6" rx="3" fill="rgba(255,255,255,0.28)"/>
</svg>
