<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="cl"><rect width="512" height="512" rx="112" ry="112"/></clipPath>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- French tricolor background -->
  <g clip-path="url(#cl)">
    <rect width="512" height="512" fill="#002395"/>
    <rect x="171" y="0" width="170" height="512" fill="#F5F5F5"/>
    <rect x="341" y="0" width="171" height="512" fill="#ED2939"/>
    <rect width="512" height="512" fill="url(#fade)"/>
    <rect width="512" height="512" fill="rgba(0,10,40,0.30)"/>
  </g>

  <!-- Ferry silhouette (side view, bow facing right) -->
  <g fill="white" opacity="0.96">
    <!-- Funnel cap -->
    <rect x="152" y="100" width="58" height="18" rx="5"/>
    <!-- Funnel stack -->
    <rect x="163" y="118" width="36" height="66" rx="9"/>

    <!-- Bridge / wheelhouse (forward) -->
    <rect x="292" y="180" width="132" height="64" rx="8"/>

    <!-- Upper superstructure spanning full ship -->
    <rect x="70" y="242" width="354" height="72" rx="8"/>

    <!-- Main deck -->
    <rect x="54" y="312" width="376" height="58" rx="6"/>

    <!-- Hull with pointed bow on right -->
    <path d="M 44,368 L 64,346 L 444,346 L 480,368 L 444,410 L 44,410 Z"/>

    <!-- Waterline shimmer -->
    <rect x="44" y="406" width="436" height="5" rx="2.5" opacity="0.4"/>
  </g>
</svg>
