<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="cl"><rect width="512" height="512" rx="112"/></clipPath>
    <linearGradient id="vig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>

  <!-- Background: sky gradient -->
  <g clip-path="url(#cl)">
    <rect width="512" height="512" fill="#1e40af"/>
    <rect y="0" width="512" height="512" fill="url(#vig)" opacity="0.5"/>
    <!-- Sky -->
    <rect width="512" height="340" fill="#1d4ed8"/>
    <!-- Sea -->
    <rect y="340" width="512" height="172" fill="url(#sea)"/>
    <!-- Sand -->
    <rect y="410" width="512" height="102" fill="#fde68a"/>
    <!-- Wave highlight -->
    <ellipse cx="256" cy="410" rx="280" ry="12" fill="#38bdf8" opacity="0.5"/>
  </g>

  <!--
    Umbrella canopy: semicircle, centre (256, 270), radius 170
    Points every 30°:
      P0 (180°) = (86, 270)
      P1 (150°) = (109, 185)
      P2 (120°) = (171, 123)
      P3  (90°) = (256, 100)
      P4  (60°) = (341, 123)
      P5  (30°) = (403, 185)
      P6   (0°) = (426, 270)
    Arc sweep-flag=0 (counterclockwise in SVG = through the top)
  -->

  <!-- 6 wedges: blue / white / red / blue / white / red -->
  <path d="M256,270 L86,270  A170,170 0 0,0 109,185 Z" fill="#1d4ed8"/>
  <path d="M256,270 L109,185 A170,170 0 0,0 171,123 Z" fill="#f5f5f5"/>
  <path d="M256,270 L171,123 A170,170 0 0,0 256,100 Z" fill="#ef4444"/>
  <path d="M256,270 L256,100 A170,170 0 0,0 341,123 Z" fill="#1d4ed8"/>
  <path d="M256,270 L341,123 A170,170 0 0,0 403,185 Z" fill="#f5f5f5"/>
  <path d="M256,270 L403,185 A170,170 0 0,0 426,270 Z" fill="#ef4444"/>

  <!-- Canopy arc outline and base line -->
  <path d="M86,270 A170,170 0 0,0 426,270" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="4"/>
  <line x1="86" y1="270" x2="426" y2="270" stroke="rgba(255,255,255,0.35)" stroke-width="3"/>

  <!-- Rib lines -->
  <line x1="256" y1="270" x2="86"  y2="270" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>
  <line x1="256" y1="270" x2="109" y2="185" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>
  <line x1="256" y1="270" x2="171" y2="123" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>
  <line x1="256" y1="270" x2="256" y2="100" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>
  <line x1="256" y1="270" x2="341" y2="123" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>
  <line x1="256" y1="270" x2="403" y2="185" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>
  <line x1="256" y1="270" x2="426" y2="270" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>

  <!-- Centre hub -->
  <circle cx="256" cy="270" r="15" fill="white" opacity="0.95"/>

  <!-- Pole (angled into sand) -->
  <line x1="256" y1="270" x2="300" y2="432" stroke="white" stroke-width="13" stroke-linecap="round" opacity="0.95"/>

  <!-- Pole base in sand -->
  <ellipse cx="300" cy="430" rx="18" ry="6" fill="#fbbf24" opacity="0.7"/>
</svg>
